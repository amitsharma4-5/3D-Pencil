<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A 3D pencil drawing app built with Three.js and Paper.js, inspired by Material Design.">
  <meta property="og:title" content="Pencil 3D">
  <meta property="og:description" content="Draw on a sketchpad with a 3D pencil rendered in Three.js.">
  <title>Pencil 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wrapper">
    <div id="bg"></div>
    <div id="intro"></div>
    <div id="sketchpad"></div>
    <canvas id="sketch"></canvas>
    <canvas id="pencil3D"></canvas>
    <button id="clearBtn" onclick="clearSketch()">&#x2715; Clear</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r79/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.79.0/examples/js/loaders/MTLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.79.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.4/TweenMax.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
